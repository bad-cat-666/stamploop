<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chan's Coffee - Barista Terminal</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --bg-color: #F5F0EB; 
      --primary-color: #4A3525; 
      --accent-color: #D4A373; 
      --card-bg: #FFFFFF;
    }
    
    body { 
      text-align: center; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      padding-top: 40px; 
      background-color: var(--bg-color); 
      color: var(--primary-color);
      margin: 0;
    }
    
    h1 { font-size: 28px; letter-spacing: 1px; margin-bottom: 5px; }
    p { color: #888; font-size: 14px; margin-bottom: 25px; }
    
    /* 卡片通用样式 */
    .card { 
      background: var(--card-bg); 
      border-radius: 20px; 
      box-shadow: 0 15px 35px rgba(74, 53, 37, 0.08); 
      max-width: 400px; 
      margin: 0 auto; 
      padding: 30px; 
      width: 85%;
      margin-bottom: 20px;
    }
    
    /* 登录界面 */
    #login-section { display: block; }
    .input-field {
      width: 90%; padding: 12px; margin: 10px 0; border: 2px solid #E0D5C1;
      border-radius: 8px; font-size: 16px; outline: none;
    }
    .input-field:focus { border-color: var(--accent-color); }
    #login-error { color: red; font-size: 14px; display: none; margin-bottom: 10px; }

    /* 工作区 */
    #app-section { display: none; }
    #control-panel { display: none; }
    
    /* 🚀 优化扫码框外观，去掉了所有多余的边框 */
    #reader { width: 100%; border-radius: 12px; overflow: hidden; border: none; }
    #reader video { border-radius: 12px; object-fit: cover; }
    
    #current-stamps-display { font-size: 56px; color: var(--primary-color); margin: 15px 0; font-weight: bold; }
    
    .btn { 
      padding: 16px 20px; font-size: 18px; margin: 8px 0; border: none; 
      border-radius: 12px; cursor: pointer; color: white; font-weight: bold; 
      width: 100%; transition: all 0.2s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
    .btn:active { transform: translateY(0); }
    
    .btn-login { background-color: var(--primary-color); }
    .btn-add { background-color: var(--primary-color); }
    .btn-redeem { background-color: var(--accent-color); display: none; }
    .btn-cancel { background-color: #E0D5C1; color: var(--primary-color); box-shadow: none; }
    .btn-logout { background-color: #ddd; color: #555; padding: 10px; font-size: 14px; margin-top: 20px; }
    
    #status { margin-top: 25px; font-size: 16px; font-weight: bold; color: var(--accent-color); }
  </style>
</head>
<body>
  
  <h1>Chan's Coffee</h1>
  
  <div id="login-section" class="card">
    <p>Staff Login Required</p>
    <div id="login-error">Invalid email or password!</div>
    <input type="email" id="email" class="input-field" placeholder="Email Address">
    <input type="password" id="password" class="input-field" placeholder="Password">
    <button class="btn btn-login" id="btn-login">Login</button>
  </div>

  <div id="app-section">
    <div id="scanner-section" class="card">
      <p style="margin-bottom: 10px; color: #888;">Point camera at customer's QR code</p>
      <div id="reader"></div>
      <button class="btn btn-logout" id="btn-logout">Logout System</button>
    </div>

    <div id="control-panel" class="card">
      <h2 id="customer-id-display" style="font-size: 14px; color: #888; font-weight: normal; line-height: 1.5; margin: 0;">
        User: ---
      </h2>
      <div id="current-stamps-display">0 ☕</div>
      <button class="btn btn-add" id="btn-add">+1 Coffee Stamp</button>
      <button class="btn btn-redeem" id="btn-redeem">Redeem Free Coffee (-10)</button>
      <button class="btn btn-cancel" id="btn-cancel">Cancel</button>
    </div>
    
    <div id="status">Ready to scan...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCy2L_W38K-7JHtbfLu1oJeHcxkCr9yk2o",
      authDomain: "stamploop-6c637.firebaseapp.com",
      projectId: "stamploop-6c637",
      storageBucket: "stamploop-6c637.firebasestorage.app",
      messagingSenderId: "478328647867",
      appId: "1:478328647867:web:a31a5bd7f3279304d3b99e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app); 

    const loginSection = document.getElementById('login-section');
    const appSection = document.getElementById('app-section');
    const loginError = document.getElementById('login-error');
    
    let currentUserId = null;
    let isScanning = true;
    let html5QrCode = null; // 🚀 改用更纯净的底层实例

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginSection.style.display = 'none';
        appSection.style.display = 'block';
        if (!html5QrCode) {
          initScanner(); 
        }
      } else {
        loginSection.style.display = 'block';
        appSection.style.display = 'none';
        // 如果登出，顺便关掉摄像头省电
        if (html5QrCode && html5QrCode.isScanning) {
          html5QrCode.stop();
          html5QrCode = null;
        }
      }
    });

    document.getElementById('btn-login').onclick = async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        loginError.style.display = 'none';
      } catch (error) {
        loginError.style.display = 'block';
      }
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    const scannerSection = document.getElementById('scanner-section');
    const controlPanel = document.getElementById('control-panel');
    const customerIdDisplay = document.getElementById('customer-id-display');
    const currentStampsDisplay = document.getElementById('current-stamps-display');
    const btnAdd = document.getElementById('btn-add');
    const btnRedeem = document.getElementById('btn-redeem');
    const btnCancel = document.getElementById('btn-cancel');
    const statusDiv = document.getElementById('status');

    function playBeep() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.type = 'sine'; 
      oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime); 
      gainNode.gain.setValueAtTime(1, audioCtx.currentTime); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); 
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.1);
    }

    async function onScanSuccess(decodedText) {
      if (!isScanning) return; 
      isScanning = false; 
      playBeep();
      currentUserId = decodedText;
      statusDiv.innerText = `Connecting to cloud...`;
      
      try {
        const userRef = doc(db, "users", currentUserId);
        const userSnap = await getDoc(userRef);
        
        if (userSnap.exists()) {
          const userData = userSnap.data();
          const stamps = userData.stamp_count || 0;
          const customerName = userData.name || "Coffee Lover"; 
          
          scannerSection.style.display = "none";
          controlPanel.style.display = "block";
          statusDiv.innerText = "Awaiting action";
          
          customerIdDisplay.innerHTML = `
            <span style="font-size: 24px; font-weight: bold; color: #4A3525;">${customerName}</span><br>
            <span style="font-size: 11px; color: #aaa;">ID: ${currentUserId}</span>
          `;
          
          currentStampsDisplay.innerText = `${stamps} ☕`;
          btnRedeem.style.display = (stamps >= 10) ? "block" : "none";
        } else {
          statusDiv.innerText = "User not registered!";
          setTimeout(resetScanner, 2000);
        }
      } catch (error) {
        statusDiv.innerText = "Network Error";
        setTimeout(resetScanner, 2000);
      }
    }

    btnAdd.onclick = async () => await processTransaction(1, "Added 1 Coffee Stamp!");
    
    btnRedeem.onclick = async () => {
      if(confirm("Redeem 10 stamps for a free coffee?")) {
        await processTransaction(-10, "Reward Redeemed! Enjoy the coffee.");
      }
    };

    btnCancel.onclick = () => resetScanner();

    async function processTransaction(amount, successMessage) {
      statusDiv.innerText = "Processing transaction...";
      try {
        const userRef = doc(db, "users", currentUserId);
        await updateDoc(userRef, { stamp_count: increment(amount) });
        alert(successMessage);
        resetScanner(); 
      } catch (error) {
        alert("Transaction failed!");
        resetScanner();
      }
    }

    function resetScanner() {
      currentUserId = null;
      isScanning = true;
      scannerSection.style.display = "block";
      controlPanel.style.display = "none";
      statusDiv.innerText = "Ready to scan...";
    }

    // 🚀 全新的纯净版扫描器启动逻辑
    function initScanner() {
      html5QrCode = new Html5Qrcode("reader");
      
      // 直接强制启动后置摄像头 (facingMode: "environment")
      html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 15, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        (errorMessage) => { 
          // 忽略每一帧没扫到二维码时的默认报错信息
        }
      ).catch((err) => {
        console.error("Camera Error: ", err);
        statusDiv.innerText = "Camera blocked or not found. Please check permissions.";
      });
    }
  </script>
</body>
</html>
