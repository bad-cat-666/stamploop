<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat's Coffee - Member App</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg-color: #F5F0EB; 
      --primary-color: #4A3525; 
      --accent-color: #D4A373; 
      --card-bg: #FFFFFF;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--primary-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    /* 🚪 登录/注册大厅 */
    #auth-wrapper {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(74, 53, 37, 0.15);
      width: 100%;
      max-width: 380px; 
      padding: 40px 30px;
      box-sizing: border-box;
      text-align: center;
    }

    #auth-wrapper h2 { margin-top: 0; font-size: 28px; }
    #auth-wrapper p { color: #888; font-size: 14px; margin-bottom: 25px; }

    /* Google 一键登录按钮 */
    .btn-google {
      width: 100%; padding: 14px; font-size: 16px; border: 1px solid #ccc;
      border-radius: 10px; cursor: pointer; color: #444; font-weight: bold;
      background-color: white; display: flex; justify-content: center;
      align-items: center; gap: 10px; transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05); margin-bottom: 15px;
    }
    .btn-google:active { transform: scale(0.98); background-color: #f9f9f9; }

    /* "OR" 分割线 */
    .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #aaa; font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; }
    .divider:not(:empty)::before { margin-right: 15px; }
    .divider:not(:empty)::after { margin-left: 15px; }

    /* 表单输入框 */
    .input-field {
      width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #E0D5C1;
      border-radius: 8px; font-size: 15px; outline: none; box-sizing: border-box;
    }
    .input-field:focus { border-color: var(--accent-color); }

    .btn {
      width: 100%; padding: 14px; font-size: 16px; margin: 15px 0 10px 0;
      border: none; border-radius: 10px; cursor: pointer; color: white;
      font-weight: bold; transition: all 0.2s ease; background-color: var(--primary-color);
    }
    .btn:active { transform: scale(0.98); }
    
    .switch-link { color: var(--accent-color); font-size: 14px; cursor: pointer; text-decoration: underline; margin-top: 5px; display: inline-block;}
    
    #register-form { display: none; }
    #auth-error { color: red; font-size: 13px; margin-top: 15px; display: none; }

    /* ☕ 垂直版数字会员卡 (Vertical App) */
    #app-wrapper {
      display: none; 
      flex-direction: column; 
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(74, 53, 37, 0.15);
      overflow: hidden;
      max-width: 380px; 
      width: 100%;
    }

    .top-panel { background-color: var(--primary-color); color: white; padding: 35px 20px 25px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
    .brand-name { font-size: 26px; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
    .welcome-text { font-size: 15px; color: var(--accent-color); margin-bottom: 20px; }
    .qr-box { background: white; padding: 12px; border-radius: 12px; display: inline-block; margin-bottom: 15px;}
    .btn-logout { background-color: transparent; border: 1px solid #D4A373; color: #D4A373; padding: 6px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; margin-top: 5px;}
    .btn-logout:hover { background-color: rgba(212, 163, 115, 0.1); }

    .bottom-panel { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
    .status-text { font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: center; }
    .stamp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
    .stamp-circle { aspect-ratio: 1 / 1; width: 45px; border: 3px dashed #E0D5C1; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 22px; transition: all 0.3s ease; }
    .stamp-circle.active { border: 3px solid var(--accent-color); background-color: var(--accent-color); color: white; transform: scale(1.05); box-shadow: 0 4px 10px rgba(212, 163, 115, 0.4); }
    .reward-msg { text-align: center; font-size: 14px; color: #888; min-height: 20px; }
  </style>
</head>
<body>

  <!-- 🚪 综合登录大厅 -->
  <div id="auth-wrapper">
    <h2>Cat's Coffee</h2>
    <p>Sign in to your digital loyalty card</p>

    <!-- Google 登录 -->
    <button class="btn-google" id="btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    
    <div class="divider">OR</div>

    <!-- 邮箱登录表单 -->
    <div id="login-form">
      <input type="email" id="login-email" class="input-field" placeholder="Email Address">
      <input type="password" id="login-password" class="input-field" placeholder="Password">
      <button class="btn" id="btn-login">Sign In</button>
      <div class="switch-link" id="go-to-register">New customer? Create account</div>
    </div>

    <!-- 邮箱注册表单 -->
    <div id="register-form">
      <input type="text" id="reg-name" class="input-field" placeholder="Full Name">
      <input type="tel" id="reg-phone" class="input-field" placeholder="Phone Number">
      <input type="date" id="reg-dob" class="input-field" title="Birthday">
      <input type="email" id="reg-email" class="input-field" placeholder="Email Address">
      <input type="password" id="reg-password" class="input-field" placeholder="Create Password">
      <button class="btn" id="btn-register">Join Rewards</button>
      <div class="switch-link" id="go-to-login">Already have an account? Sign in</div>
    </div>
    
    <div id="auth-error">Error message goes here</div>
  </div>

  <!-- ☕ 会员专属空间 -->
  <div id="app-wrapper">
    <div class="top-panel">
      <div class="brand-name">Cat's Coffee</div>
      <div class="welcome-text" id="welcome-name">Loading...</div>
      <div class="qr-box">
        <div id="qrcode"></div>
      </div>
      <p style="font-size: 12px; margin: 0; color: #bbb;">Show this code to barista</p>
      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>

    <div class="bottom-panel">
      <div class="status-text" id="status-title">Loading your card...</div>
      <div class="stamp-grid" id="stamp-grid"></div>
      <div class="reward-msg" id="reward-msg">Buy 10 coffees, get 1 free!</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    // 💡 确保所有 Auth 需要的模块都在这里
    import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCy2L_W38K-7JHtbfLu1oJeHcxkCr9yk2o",
      authDomain: "stamploop-6c637.firebaseapp.com",
      projectId: "stamploop-6c637",
      storageBucket: "stamploop-6c637.firebasestorage.app",
      messagingSenderId: "478328647867",
      appId: "1:478328647867:web:a31a5bd7f3279304d3b99e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // UI 元素
    const authWrapper = document.getElementById('auth-wrapper');
    const appWrapper = document.getElementById('app-wrapper');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const authError = document.getElementById('auth-error');

    // 切换登录/注册表单
    document.getElementById('go-to-register').onclick = () => {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
      authError.style.display = 'none';
    };

    document.getElementById('go-to-login').onclick = () => {
      registerForm.style.display = 'none';
      loginForm.style.display = 'block';
      authError.style.display = 'none';
    };

    let unsubscribeSnapshot = null;

    // 🔐 状态监听 (控制页面翻转)
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        authWrapper.style.display = 'none';
        appWrapper.style.display = 'flex'; 
        
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
          text: user.uid,
          width: 160, height: 160,
          colorDark : "#4A3525", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });

        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        
        if(userSnap.exists() && userSnap.data().name) {
           document.getElementById("welcome-name").innerText = "Hi, " + userSnap.data().name + "!";
        } else {
           document.getElementById("welcome-name").innerText = "Hi, " + (user.displayName || "Coffee Lover") + "!";
        }

        unsubscribeSnapshot = onSnapshot(userRef, (docSnap) => {
          if (docSnap.exists()) {
            renderStamps(docSnap.data().stamp_count || 0);
          }
        });
      } else {
        authWrapper.style.display = 'block';
        appWrapper.style.display = 'none';
        // 登出后重置回登录表单
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
        if (unsubscribeSnapshot) unsubscribeSnapshot();
      }
    });

    // 🇬 谷歌一键登录逻辑
    document.getElementById('btn-google').onclick = async () => {
      try {
        authError.style.display = 'none';
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        
        if (!userSnap.exists()) {
          await setDoc(userRef, {
            name: user.displayName || "Coffee Lover",
            email: user.email,
            stamp_count: 0
          });
        }
      } catch (error) {
        showError(error.message);
      }
    };

    // 📧 邮箱注册逻辑
    document.getElementById('btn-register').onclick = async () => {
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const name = document.getElementById('reg-name').value;
      const phone = document.getElementById('reg-phone').value;
      const dob = document.getElementById('reg-dob').value;

      if(!name || !phone || !email || !password) {
        showError("Please fill in all required fields.");
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", userCredential.user.uid), {
          name: name, phone: phone, birthday: dob, email: email, stamp_count: 0
        });
      } catch (error) {
        showError(error.message);
      }
    };

    // 🔑 邮箱登录逻辑
    document.getElementById('btn-login').onclick = async () => {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        showError("Invalid email or password.");
      }
    };

    // 登出逻辑
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    function showError(msg) {
      authError.innerText = msg;
      authError.style.display = 'block';
    }

    // ☕ 印章渲染逻辑
    function renderStamps(currentScore) {
      const grid = document.getElementById("stamp-grid");
      grid.innerHTML = ""; 
      const displayScore = currentScore % 10; 
      const isRewardReady = currentScore > 0 && currentScore % 10 === 0;

      for (let i = 0; i < 10; i++) {
        const circle = document.createElement("div");
        if (i < displayScore || (isRewardReady && i < 10)) {
          circle.className = "stamp-circle active";
          circle.innerText = "☕"; 
        } else {
          circle.className = "stamp-circle";
          circle.innerText = ""; 
        }
        grid.appendChild(circle);
      }
      if (isRewardReady) {
        document.getElementById("status-title").innerText = "🎉 Reward Unlocked!";
        document.getElementById("status-title").style.color = "#D4A373";
        document.getElementById("reward-msg").innerText = "You have a free coffee waiting!";
      } else {
        document.getElementById("status-title").innerText = `You have ${displayScore} stamps`;
        document.getElementById("status-title").style.color = "#4A3525";
        document.getElementById("reward-msg").innerText = `${10 - displayScore} more coffees to go!`;
      }
    }
  </script>
</body>
</html>
