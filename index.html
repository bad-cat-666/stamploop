<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat's Coffee - Member Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg-color: #F5F0EB; 
      --primary-color: #4A3525; 
      --accent-color: #D4A373; 
      --card-bg: #FFFFFF;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--primary-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    /* 卡片通用样式 */
    .card {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(74, 53, 37, 0.1);
      width: 100%;
      max-width: 400px;
      padding: 30px;
      box-sizing: border-box;
      text-align: center;
    }

    h2 { margin-top: 0; color: var(--primary-color); }
    p { color: #888; font-size: 14px; margin-bottom: 20px; }

    /* 表单输入框 */
    .input-field {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 2px solid #E0D5C1;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
    }
    .input-field:focus { border-color: var(--accent-color); }

    /* 按钮样式 */
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      margin: 15px 0 10px 0;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      transition: all 0.2s ease;
      background-color: var(--primary-color);
    }
    .btn:active { transform: scale(0.98); }
    
    .switch-link {
      color: var(--accent-color);
      font-size: 14px;
      cursor: pointer;
      text-decoration: underline;
    }

    /* 模块切换 */
    #auth-section { display: block; }
    #member-section { display: none; }
    
    /* 注册表单默认隐藏 */
    #register-form { display: none; }
    #login-form { display: block; }
    
    #auth-error { color: red; font-size: 13px; margin-top: 10px; display: none; }

    /* 会员卡区样式 */
    .qr-box { background: white; padding: 15px; border-radius: 12px; display: inline-block; border: 2px dashed #E0D5C1; margin-bottom: 20px;}
    .stamp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
    .stamp-circle {
      aspect-ratio: 1 / 1; border: 2px dashed #E0D5C1; border-radius: 50%;
      display: flex; justify-content: center; align-items: center; font-size: 20px;
    }
    .stamp-circle.active {
      border: 2px solid var(--accent-color); background-color: var(--accent-color); color: white;
    }
    #welcome-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
  </style>
</head>
<body>

  <!-- 🚪 1. 登录与注册大厅 -->
  <div id="auth-section" class="card">
    <h2>Chan's Coffee</h2>
    <p>Join our rewards program</p>

    <!-- 登录表单 -->
    <div id="login-form">
      <input type="email" id="login-email" class="input-field" placeholder="Email">
      <input type="password" id="login-password" class="input-field" placeholder="Password">
      <button class="btn" id="btn-login">Login</button>
      <div class="switch-link" id="go-to-register">New customer? Create account</div>
    </div>

    <!-- 注册表单 (包含你要求的所有字段) -->
    <div id="register-form">
      <input type="text" id="reg-name" class="input-field" placeholder="Full Name">
      <input type="tel" id="reg-phone" class="input-field" placeholder="Phone Number">
      <input type="date" id="reg-dob" class="input-field" title="Birthday">
      <input type="email" id="reg-email" class="input-field" placeholder="Email">
      <input type="password" id="reg-password" class="input-field" placeholder="Create Password">
      <button class="btn" id="btn-register">Create Account</button>
      <div class="switch-link" id="go-to-login">Already have an account? Login</div>
    </div>
    
    <div id="auth-error">Error message goes here</div>
  </div>

  <!-- ☕ 2. 会员专属空间 (登录后才显示) -->
  <div id="member-section" class="card">
    <div id="welcome-name">Loading...</div>
    <p id="status-title">Loading your card...</p>
    
    <div class="qr-box">
      <div id="qrcode"></div>
    </div>

    <div class="stamp-grid" id="stamp-grid"></div>
    <button class="btn" id="btn-logout" style="background-color: #ddd; color: #555; padding: 10px; margin-top: 20px;">Logout</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    // 引入 Auth 模块处理顾客登录/注册
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCy2L_W38K-7JHtbfLu1oJeHcxkCr9yk2o",
      authDomain: "stamploop-6c637.firebaseapp.com",
      projectId: "stamploop-6c637",
      storageBucket: "stamploop-6c637.firebasestorage.app",
      messagingSenderId: "478328647867",
      appId: "1:478328647867:web:a31a5bd7f3279304d3b99e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // UI 切换控制
    const authSection = document.getElementById('auth-section');
    const memberSection = document.getElementById('member-section');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const authError = document.getElementById('auth-error');

    document.getElementById('go-to-register').onclick = () => {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
      authError.style.display = 'none';
    };

    document.getElementById('go-to-login').onclick = () => {
      registerForm.style.display = 'none';
      loginForm.style.display = 'block';
      authError.style.display = 'none';
    };

    let unsubscribeSnapshot = null; // 用来随时关掉数据库监听器

    // ==========================================
    // 🔐 系统核心：监听顾客是否已经登录
    // ==========================================
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // 顾客已登录：进入会员空间
        authSection.style.display = 'none';
        memberSection.style.display = 'block';
        
        // 1. 生成二维码 (内容就是 Firebase 给这个账号分配的独一无二的 UID)
        document.getElementById("qrcode").innerHTML = ""; // 清空旧图
        new QRCode(document.getElementById("qrcode"), {
          text: user.uid,
          width: 150, height: 150,
          colorDark : "#4A3525", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });

        // 2. 去数据库拉取这个顾客的详细资料 (名字)
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        if(userSnap.exists()) {
           document.getElementById("welcome-name").innerText = "Hi, " + userSnap.data().name;
        }

        // 3. 实时监听这个 UID 的分数变化
        unsubscribeSnapshot = onSnapshot(userRef, (docSnap) => {
          if (docSnap.exists()) {
            renderStamps(docSnap.data().stamp_count || 0);
          }
        });

      } else {
        // 顾客未登录：显示大厅
        authSection.style.display = 'block';
        memberSection.style.display = 'none';
        if (unsubscribeSnapshot) unsubscribeSnapshot(); // 停止窃听数据
      }
    });

    // ==========================================
    // 📝 顾客注册逻辑 (联表操作！)
    // ==========================================
    document.getElementById('btn-register').onclick = async () => {
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const name = document.getElementById('reg-name').value;
      const phone = document.getElementById('reg-phone').value;
      const dob = document.getElementById('reg-dob').value;

      if(!name || !phone || !email || !password) {
        showError("Please fill in all required fields.");
        return;
      }

      try {
        // 第一步：在 Auth 里创建安全登录凭证
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const newUserId = userCredential.user.uid; // 获取系统分配的安全 ID
        
        // 第二步：拿着这个 ID，去 Firestore 数据库里建档！
        await setDoc(doc(db, "users", newUserId), {
          name: name,
          phone: phone,
          birthday: dob,
          email: email,
          stamp_count: 0 // 初始分数为0
        });

      } catch (error) {
        showError(error.message);
      }
    };

    // ==========================================
    // 🔑 顾客登录与登出逻辑
    // ==========================================
    document.getElementById('btn-login').onclick = async () => {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        showError("Invalid email or password.");
      }
    };

    document.getElementById('btn-logout').onclick = () => {
      signOut(auth);
    };

    function showError(msg) {
      authError.innerText = msg;
      authError.style.display = 'block';
    }

    // 画咖啡杯网格的代码 (与之前一致)
    function renderStamps(currentScore) {
      const grid = document.getElementById("stamp-grid");
      grid.innerHTML = ""; 
      const displayScore = currentScore % 10; 
      const isRewardReady = currentScore > 0 && currentScore % 10 === 0;

      for (let i = 0; i < 10; i++) {
        const circle = document.createElement("div");
        if (i < displayScore || (isRewardReady && i < 10)) {
          circle.className = "stamp-circle active";
          circle.innerText = "☕"; 
        } else {
          circle.className = "stamp-circle";
          circle.innerText = ""; 
        }
        grid.appendChild(circle);
      }
      if (isRewardReady) document.getElementById("status-title").innerText = "🎉 Reward Unlocked!";
      else document.getElementById("status-title").innerText = `${10 - displayScore} more coffees to go!`;
    }
  </script>
</body>
</html>
