<!DOCTYPE html>
<html>
<head>
  <title>StampLoop - My Stamps</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { text-align: center; font-family: sans-serif; padding-top: 30px; background-color: #f9f9f9; }
    #stampCountDisplay { font-size: 56px; color: #4CAF50; margin: 10px 0; font-weight: bold; }
    .qr-card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); display: inline-block; margin-top: 20px; }
    .qr-card img { width: 200px; height: 200px; }
    .qr-card p { color: #666; font-size: 14px; margin-top: 15px; }
  </style>
</head>
<body>
  
  <h1>My StampLoop</h1>
  <h2 id="stampCountDisplay">Loading...</h2>

  <div class="qr-card">
    <div id="qrcode" style="display: flex; justify-content: center; margin: 20px;"></div>
    <p>Please show this QR code to the cashier</p>
  </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 💡 修复点：在这里全局定义你的 User ID！
    const myUserId = "test_user_001";

    // 让系统自动画出二维码
    const qrCodeContainer = document.getElementById("qrcode");
    new QRCode(qrCodeContainer, {
      text: myUserId, // 现在系统认识这个变量了
      width: 250,
      height: 250,
      colorDark : "#000000",
      colorLight : "#ffffff",
      correctLevel : QRCode.CorrectLevel.H
    });

    const firebaseConfig = {
      apiKey: "AIzaSyCy2L_W38K-7JHtbfLu1oJeHcxkCr9yk2o",
      authDomain: "stamploop-6c637.firebaseapp.com",
      projectId: "stamploop-6c637",
      storageBucket: "stamploop-6c637.firebasestorage.app",
      messagingSenderId: "478328647867",
      appId: "1:478328647867:web:a31a5bd7f3279304d3b99e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 💡 修复点：这里也复用刚才定义的变量，保持数据一致性
    const docRef = doc(db, "users", myUserId);

    // 核心魔法：onSnapshot 实时监听！
    onSnapshot(docRef, (docSnap) => {
      if (docSnap.exists()) {
        const userData = docSnap.data();
        document.getElementById("stampCountDisplay").innerText = userData.stamp_count + " Stamps";
        console.log("叮！检测到数据库更新，当前积分: ", userData.stamp_count);
      } else {
        document.getElementById("stampCountDisplay").innerText = "User not found";
      }
    });
  </script>
