<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat's Coffee - Member App</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg-color: #F5F0EB; 
      --primary-color: #4A3525; 
      --accent-color: #D4A373; 
      --card-bg: #FFFFFF;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--primary-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    /* =========================================
       1. 登录/注册大厅样式
       ========================================= */
    #auth-wrapper {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(74, 53, 37, 0.15);
      width: 100%;
      max-width: 380px; /* 和会员卡保持一样的手机宽度 */
      padding: 40px 30px;
      box-sizing: border-box;
      text-align: center;
    }

    #auth-wrapper h2 { margin-top: 0; font-size: 28px; }
    #auth-wrapper p { color: #888; font-size: 14px; margin-bottom: 25px; }

    .input-field {
      width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #E0D5C1;
      border-radius: 8px; font-size: 15px; outline: none; box-sizing: border-box;
    }
    .input-field:focus { border-color: var(--accent-color); }

    .btn {
      width: 100%; padding: 14px; font-size: 16px; margin: 15px 0 10px 0;
      border: none; border-radius: 10px; cursor: pointer; color: white;
      font-weight: bold; transition: all 0.2s ease; background-color: var(--primary-color);
    }
    .btn:active { transform: scale(0.98); }
    
    .switch-link { color: var(--accent-color); font-size: 14px; cursor: pointer; text-decoration: underline; }
    #register-form { display: none; }
    #auth-error { color: red; font-size: 13px; margin-top: 10px; display: none; }

    /* =========================================
       2. 垂直版数字会员卡样式 (Vertical App)
       ========================================= */
    #app-wrapper {
      display: none; /* 默认隐藏，登录后才显示 */
      flex-direction: column; 
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(74, 53, 37, 0.15);
      overflow: hidden;
      max-width: 380px; 
      width: 100%;
    }

    /* 上半区：深色背景，放二维码 */
    .top-panel {
      background-color: var(--primary-color);
      color: white;
      padding: 35px 20px 25px 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand-name { font-size: 26px; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
    .welcome-text { font-size: 14px; color: var(--accent-color); margin-bottom: 20px; }

    .qr-box { background: white; padding: 12px; border-radius: 12px; display: inline-block; margin-bottom: 15px;}

    .btn-logout { background-color: transparent; border: 1px solid #D4A373; color: #D4A373; padding: 6px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; margin-top: 5px;}
    .btn-logout:hover { background-color: rgba(212, 163, 115, 0.1); }

    /* 下半区：浅色背景，放印章 */
    .bottom-panel {
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .status-text { font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: center; }

    .stamp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
    .stamp-circle {
      aspect-ratio: 1 / 1; width: 45px; border: 3px dashed #E0D5C1; border-radius: 50%;
      display: flex; justify-content: center; align-items: center; font-size: 22px; transition: all 0.3s ease;
    }
    .stamp-circle.active {
      border: 3px solid var(--accent-color); background-color: var(--accent-color); color: white; transform: scale(1.05); box-shadow: 0 4px 10px rgba(212, 163, 115, 0.4);
    }
    .reward-msg { text-align: center; font-size: 14px; color: #888; min-height: 20px; }
  </style>
</head>
<body>

  <!-- 🚪 登录/注册大厅 -->
  <div id="auth-wrapper">
    <h2>Cat's Coffee</h2>
    <p>Sign in to your digital loyalty card</p>

    <!-- 登录表单 -->
    <div id="login-form">
      <input type="email" id="login-email" class="input-field" placeholder="Email Address">
      <input type="password" id="login-password" class="input-field" placeholder="Password">
      <button class="btn" id="btn-login">Sign In</button>
      <div class="switch-link" id="go-to-register">New customer? Create account</div>
    </div>

    <!-- 注册表单 -->
    <div id="register-form">
      <input type="text" id="reg-name" class="input-field" placeholder="Full Name">
      <input type="tel" id="reg-phone" class="input-field" placeholder="Phone Number">
      <input type="date" id="reg-dob" class="input-field" title="Birthday">
      <input type="email" id="reg-email" class="input-field" placeholder="Email Address">
      <input type="password" id="reg-password" class="input-field" placeholder="Create Password">
      <button class="btn" id="btn-register">Join Rewards</button>
      <div class="switch-link" id="go-to-login">Already have an account? Sign in</div>
    </div>
    
    <div id="auth-error">Error message goes here</div>
  </div>

  <!-- ☕ 会员专属空间 (垂直版数字卡) -->
  <div id="app-wrapper">
    
    <div class="top-panel">
      <div class="brand-name">Cat's Coffee</div>
      <div class="welcome-text" id="welcome-name">Loading...</div>
      
      <div class="qr-box">
        <div id="qrcode"></div>
      </div>
      
      <p style="font-size: 12px; margin: 0; color: #bbb;">Show this code to barista</p>
      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>

    <div class="bottom-panel">
      <div class="status-text" id="status-title">Loading your card...</div>
      
      <div class="stamp-grid" id="stamp-grid">
        <!-- JS 动态生成 -->
      </div>
      
      <div class="reward-msg" id="reward-msg">Buy 10 coffees, get 1 free!</div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCy2L_W38K-7JHtbfLu1oJeHcxkCr9yk2o",
      authDomain: "stamploop-6c637.firebaseapp.com",
      projectId: "stamploop-6c637",
      storageBucket: "stamploop-6c637.firebasestorage.app",
      messagingSenderId: "478328647867",
      appId: "1:478328647867:web:a31a5bd7f3279304d3b99e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const authWrapper = document.getElementById('auth-wrapper');
    const appWrapper = document.getElementById('app-wrapper');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const authError = document.getElementById('auth-error');

    document.getElementById('go-to-register').onclick = () => {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
      authError.style.display = 'none';
    };

    document.getElementById('go-to-login').onclick = () => {
      registerForm.style.display = 'none';
      loginForm.style.display = 'block';
      authError.style.display = 'none';
    };

    let unsubscribeSnapshot = null;

    // 核心状态监听：控制界面的翻转
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        authWrapper.style.display = 'none';
        appWrapper.style.display = 'flex'; // 显示垂直排版
        
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
          text: user.uid,
          width: 160, height: 160,
          colorDark : "#4A3525", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });

        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        if(userSnap.exists()) {
           document.getElementById("welcome-name").innerText = "Hi, " + userSnap.data().name + "!";
        } else {
           document.getElementById("welcome-name").innerText = "Hi there!";
        }

        unsubscribeSnapshot = onSnapshot(userRef, (docSnap) => {
          if (docSnap.exists()) {
            renderStamps(docSnap.data().stamp_count || 0);
          }
        });
      } else {
        authWrapper.style.display = 'block';
        appWrapper.style.display = 'none';
        if (unsubscribeSnapshot) unsubscribeSnapshot();
      }
    });

    // 注册表单提交逻辑
    document.getElementById('btn-register').onclick = async () => {
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const name = document.getElementById('reg-name').value;
      const phone = document.getElementById('reg-phone').value;
      const dob = document.getElementById('reg-dob').value;

      if(!name || !phone || !email || !password) {
        showError("Please fill in all required fields.");
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", userCredential.user.uid), {
          name: name, phone: phone, birthday: dob, email: email, stamp_count: 0
        });
      } catch (error) {
        showError(error.message);
      }
    };

    // 登录表单提交逻辑
    document.getElementById('btn-login').onclick = async () => {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        showError("Invalid email or password.");
      }
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    function showError(msg) {
      authError.innerText = msg;
      authError.style.display = 'block';
    }

    function renderStamps(currentScore) {
      const grid = document.getElementById("stamp-grid");
      grid.innerHTML = ""; 
      const displayScore = currentScore % 10; 
      const isRewardReady = currentScore > 0 && currentScore % 10 === 0;

      for (let i = 0; i < 10; i++) {
        const circle = document.createElement("div");
        if (i < displayScore || (isRewardReady && i < 10)) {
          circle.className = "stamp-circle active";
          circle.innerText = "☕"; 
        } else {
          circle.className = "stamp-circle";
          circle.innerText = ""; 
        }
        grid.appendChild(circle);
      }
      if (isRewardReady) {
        document.getElementById("status-title").innerText = "🎉 Reward Unlocked!";
        document.getElementById("status-title").style.color = "#D4A373";
        document.getElementById("reward-msg").innerText = "You have a free coffee waiting!";
      } else {
        document.getElementById("status-title").innerText = `You have ${displayScore} stamps`;
        document.getElementById("status-title").style.color = "#4A3525";
        document.getElementById("reward-msg").innerText = `${10 - displayScore} more coffees to go!`;
      }
    }
  </script>
</body>
</html>
